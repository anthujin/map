    html, body { width:100%; height:100%; margin:0; padding:0; background:#f7f4ee; overflow:hidden; }
    #map { width:100vw; height:100vh; background:#f7f4ee; }

    .tdm-marker { width:17px; height:17px; border-radius:50%; background:#162746; border:2px solid #c4a15a; box-sizing:border-box; box-shadow:0 2px 8px rgba(22,39,70,.25); }
    .tdm-marker.origin { width:19px; height:19px; background:#162746; border:3px solid #c4a15a; }
    .tdm-marker.stop { width:14px; height:14px; background:#162746; border:2px solid #c4a15a; opacity:.95; }
    .tdm-marker.cruise { width:15px; height:15px; background:#162746; border:2px solid #c4a15a; }
    .tdm-label { color:#162746; font-size:11px; font-weight:700; letter-spacing:-.02em; text-shadow:0 1px 0 #fff, 1px 0 0 #fff, -1px 0 0 #fff, 0 -1px 0 #fff; }
  </style>
</head>
<body>
  <div id="map"></div>

  <script>
    const navy = '#162746';
    const gold = '#b89a5e';
    const goldLight = '#d4be88';

    const map = L.map('map', {
      zoomControl: false,
      attributionControl: true,
      scrollWheelZoom: true,
      dragging: true,
      doubleClickZoom: false,
      boxZoom: false,
      keyboard: false,
      preferCanvas: true
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
      maxZoom: 18,
      minZoom: 3,
      detectRetina: true,
      attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
    }).addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
      maxZoom: 18,
      minZoom: 3,
      detectRetina: true,
      pane: 'markerPane'
    }).addTo(map);

    const points = {
      istanbul: [41.0082, 28.9784],
      amman: [31.9539, 35.9106],
      jerash: [32.2747, 35.8914],
      madaba: [31.7195, 35.7941],
      nebo: [31.7651, 35.7258],
      deadsea: [31.5590, 35.4732],
      petra: [30.3285, 35.4444],
      wadirum: [29.5767, 35.4194],
      aqaba: [29.5319, 35.0061],
      cairo: [30.0444, 31.2357],
      saqqara: [29.8713, 31.2165],
      aswan: [24.0889, 32.8998],
      komombo: [24.4521, 32.9286],
      edfu: [24.9781, 32.8734],
      luxor: [25.6872, 32.6396]
    };

    const markerStyle = (type='base') => L.divIcon({
      className: '',
      html: `<div class="tdm-marker ${type}"></div>`,
      iconSize: type === 'origin' ? [19,19] : [17,17],
      iconAnchor: type === 'origin' ? [9.5,9.5] : [8.5,8.5]
    });

    function addMarker(key, label, type='base', direction='top') {
      const m = L.marker(points[key], { icon: markerStyle(type), title: label }).addTo(map);
      m.bindTooltip(label, { permanent: true, direction, className: 'tdm-label', offset: [0, -2] });
      return m;
    }

    // Core route markers only: no hotel pins, no dense city-inside sightseeing pins.
    addMarker('istanbul', 'Istanbul', 'origin', 'top');
    addMarker('amman', 'Amman', 'base', 'right');
    addMarker('jerash', 'Jerash', 'stop', 'right');
    addMarker('deadsea', 'Dead Sea', 'base', 'left');
    addMarker('petra', 'Petra', 'base', 'left');
    addMarker('wadirum', 'Wadi Rum', 'base', 'left');
    addMarker('aqaba', 'Aqaba', 'stop', 'bottom');
    addMarker('cairo', 'Cairo', 'origin', 'right');
    addMarker('saqqara', 'Saqqara / Memphis', 'stop', 'left');
    addMarker('aswan', 'Aswan', 'base', 'right');
    addMarker('komombo', 'Kom Ombo', 'cruise', 'right');
    addMarker('edfu', 'Edfu', 'cruise', 'right');
    addMarker('luxor', 'Luxor', 'origin', 'right');

    function route(coords, options) {
      return L.polyline(coords, Object.assign({
        color: gold,
        weight: 3,
        opacity: .92,
        lineCap: 'round',
        lineJoin: 'round',
        interactive: false
      }, options)).addTo(map);
    }

    // Air: clearer dotted route pattern.
    route([points.istanbul, points.amman], { dashArray: '2 10', weight: 3, opacity: .85 });
    route([points.aqaba, points.cairo], { dashArray: '2 10', weight: 3, opacity: .85 });
    route([points.cairo, points.aswan], { dashArray: '2 10', weight: 3, opacity: .85 });
    route([points.luxor, points.cairo], { dashArray: '2 10', weight: 3, opacity: .85 });
    route([points.cairo, points.istanbul], { dashArray: '2 10', weight: 3, opacity: .85 });

    // Vehicle: gold solid line.
    route([points.amman, points.jerash, points.amman], { weight: 3.2 });
    route([points.amman, points.madaba, points.nebo, points.deadsea, points.petra, points.wadirum, points.aqaba], { weight: 3.2 });
    route([points.cairo, points.saqqara, points.cairo], { weight: 3.2 });

    // Nile cruise: gold line, slightly softer.
    route([points.aswan, points.komombo, points.edfu, points.luxor], { color: goldLight, weight: 4, opacity: .95 });

    const bounds = L.latLngBounds([
      points.istanbul,
      points.amman,
      points.jerash,
      points.deadsea,
      points.petra,
      points.wadirum,
      points.aqaba,
      points.cairo,
      points.saqqara,
      points.aswan,
      points.komombo,
      points.edfu,
      points.luxor
    ]);

    function fit() {
      map.invalidateSize(true);
      map.fitBounds(bounds, { padding: [46, 46], maxZoom: 6 });
    }

    map.whenReady(() => {
      fit();
      setTimeout(fit, 150);
      setTimeout(fit, 600);
    });
    window.addEventListener('resize', () => setTimeout(fit, 120));
  </script>
</body>
</html>
